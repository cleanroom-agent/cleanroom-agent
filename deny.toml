# cargo-deny configuration

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
ignore = []

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
deny = []
copyleft = "deny"
default = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
